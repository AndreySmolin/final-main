name: golang-pipeline
on: push
jobs:
  test:
    name: Error checking and testing
    runs-on: ubuntu-latest
    container: golang:1.22
    steps:
      - uses: actions/checkout@v6
      - name: Vet
        run: |
          go vet ./...
      - name: Run Unit Tests
        run: GOOS=linux GOARCH=amd64 go test
